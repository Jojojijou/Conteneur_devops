name: 'Hello World'
description: 'Premier test de CI/CD'
inputs:
  who-to-greet:
    description: 'who to greet'
    required: true
    default: 'World'
output:
  time:
    description: 'The time we greeted you'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.who-to-greet }}

